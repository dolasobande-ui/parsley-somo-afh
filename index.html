<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<title>Parsley/SOMO AFH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F2937;
    --ink-soft:#5B6472;
    --paper:#F7F9FC;
    --card:#FFFFFF;
    --blue:#2B6CB0;
    --blue-light:#ADD0F3;
    --teal:#2BBFAA;
    --amber:#E8A838;
    --line:#E3E8F0;
    --shadow: 0 1px 2px rgba(31,41,55,0.04), 0 8px 24px -12px rgba(31,41,55,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding-bottom:96px;
  }
  h1,h2,h3{ font-family:'Fraunces',serif; font-weight:600; margin:0; }
  .mono{ font-family:'IBM Plex Mono',monospace; }

  header.top{
    background:var(--blue);
    padding:12px 16px;
    position:sticky; top:0; z-index:20;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .live-clock{
    color:#fff; font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600;
    letter-spacing:.01em; opacity:.95;
  }
  .admin-corner-btn{
    border:1.5px solid rgba(255,255,255,0.5); background:rgba(255,255,255,0.12); color:#fff;
    padding:7px 14px; border-radius:9px; font-size:12.5px; font-weight:600;
    font-family:'Inter',sans-serif; cursor:pointer; letter-spacing:.02em; flex-shrink:0;
  }
  .admin-corner-btn.active{ background:#fff; color:var(--blue); border-color:#fff; }
  header.top.admin-mode{ background:#0F1E2A; }

  main{ max-width:640px; margin:0 auto; padding:18px 16px 24px; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:14px; box-shadow:var(--shadow);
  }

  /* Home picker */
  .home-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:6px; }
  .home-pick{
    border:2px solid var(--line); background:#fff; border-radius:16px; padding:18px 14px;
    text-align:left; cursor:pointer; transition:.15s border-color, .15s transform;
  }
  .home-pick:active{ transform:scale(.98); }
  .home-pick.selected{ border-color:var(--blue); background:#EEF4FC; }
  .home-pick .h-name{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; }
  .home-pick .h-res{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; line-height:1.5;}

  label.field-label{ font-size:12px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:6px;}
  input[type=text], select, textarea{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:15px; background:#fff; color:var(--ink);
  }
  input[type=text]:focus, select:focus, textarea:focus{ outline:2px solid var(--blue); outline-offset:1px; border-color:var(--blue); }

  .checkin-badge{
    display:inline-flex; align-items:center; gap:6px; background:#E5F6EC; color:#1F6F3A;
    font-weight:700; font-size:13.5px; padding:7px 12px; border-radius:9px; margin-top:10px;
  }
  .auto-shift-badge{
    display:inline-flex; align-items:center; gap:6px; background:var(--blue-light); color:#1B4A78;
    font-weight:700; font-size:14.5px; padding:8px 14px; border-radius:10px; margin-top:4px;
  }
  .cheat-sheet-link{
    background:none; border:none; padding:0; margin-top:2px; font-size:13px; font-weight:700;
    color:var(--blue); cursor:pointer; font-family:'Inter',sans-serif;
  }
  .obj-link-btn{
    display:inline-block; background:var(--blue-light); color:#1B4A78; text-decoration:none;
    font-size:12.5px; font-weight:600; padding:5px 10px; border-radius:8px; font-family:'Inter',sans-serif;
  }
  .admin-shell .obj-link-btn{ background:#1E4266; color:#9FC6F5; }
  .cheat-sheet{ margin:10px 0 14px; padding:12px; background:#F7F9FC; border-radius:12px; }
  .cheat-section{ margin-bottom:12px; }
  .cheat-section:last-child{ margin-bottom:0; }
  .cheat-label{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; color:var(--ink-soft); }
  .cheat-dos .cheat-label{ color:#1F6F3A; }
  .cheat-avoids .cheat-label{ color:#B4483A; }
  .cheat-section ul{ margin:0; padding-left:18px; font-size:14px; line-height:1.5; }
  .cheat-text{ font-size:14px; line-height:1.5; }
  .today-banner{
    background:var(--blue); border-radius:14px; padding:14px 18px; margin-bottom:14px;
    text-align:center;
  }
  .today-banner-label{
    color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:19px; letter-spacing:.01em;
  }
  .today-banner-date{
    color:var(--blue-light); font-size:13px; font-weight:600; margin-top:2px;
  }
  .scroll-indicator{
    position:fixed; left:50%; transform:translateX(-50%); bottom:78px; z-index:29;
    background:var(--amber); color:#12212F; font-size:12.5px; font-weight:700;
    padding:7px 16px; border-radius:20px; box-shadow:0 4px 14px rgba(0,0,0,0.18);
    animation:bounceDown 1.6s ease-in-out infinite; transition:background .2s, color .2s;
    white-space:nowrap;
  }
  .scroll-indicator.at-bottom{
    background:var(--teal); color:#fff; animation:none;
  }
  @keyframes bounceDown{ 0%,100%{ transform:translateX(-50%) translateY(0); } 50%{ transform:translateX(-50%) translateY(4px); } }
  .resident-block{ margin-bottom:18px; }
  .resident-block h3{ font-size:17px; margin-bottom:2px; }
  .resident-progress{
    height:6px; border-radius:4px; background:var(--line); overflow:hidden; margin:8px 0 10px;
  }
  .resident-progress > div{ height:100%; background:var(--teal); transition:width .25s; }

  .category-subgroup{ margin-top:14px; }
  .category-subgroup:first-of-type{ margin-top:0; }
  .category-subgroup-label{
    font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); border-bottom:1px solid var(--line); padding-bottom:4px; margin-bottom:2px;
  }
  .admin-shell .category-subgroup-label{ color:#8FA9C2; border-color:#26415A; }

  .obj-item{
    display:flex; align-items:flex-start; gap:10px; padding:11px 4px;
    border-top:1px solid var(--line);
  }
  .obj-item:first-of-type{ border-top:none; }
  .obj-item input[type=checkbox]{
    width:22px; height:22px; margin-top:1px; accent-color:var(--teal); flex-shrink:0;
  }
  .obj-text{ font-size:14.5px; line-height:1.4; }
  .obj-text.done{ text-decoration:line-through; color:var(--ink-soft); }
  .obj-desc{ font-size:13px; color:var(--ink-soft); line-height:1.6; margin-top:4px; white-space:pre-wrap; }
  .admin-shell .obj-desc{ color:#8FA9C2; }
  .desc-toggle-btn{
    background:none; border:none; padding:4px 0; margin-top:2px; font-size:12.5px; font-weight:600;
    color:var(--amber); cursor:pointer; font-family:'Inter',sans-serif; display:block;
  }

  .obj-item-v2{ padding:12px 4px; border-top:1px solid var(--line); }
  .obj-item-v2:first-of-type{ border-top:none; }
  .status-btns{ display:flex; gap:8px; margin-top:8px; }
  .status-btn{
    flex:1; padding:9px 6px; border-radius:9px; border:1.5px solid var(--line); background:#fff;
    font-size:13px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; color:var(--ink-soft);
  }
  .status-btn.status-completed.active{ background:var(--teal); border-color:var(--teal); color:#fff; }
  .status-btn.status-notcompleted.active{ background:#B4483A; border-color:#B4483A; color:#fff; }
  .reason-input{
    width:100%; margin-top:8px; padding:8px 10px; border:1.5px solid #B4483A; border-radius:8px;
    font-family:'Inter',sans-serif; font-size:13.5px; background:#FFF6F5;
  }
  .needs-attention{ border:1.5px solid #B4483A; background:#FFF6F5; }
  .needs-attention .obj-item-v2{ border-top-color:#F0C6C0; }

  .tag{
    display:inline-block; font-size:10.5px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; padding:2px 7px; border-radius:6px; margin-bottom:5px;
  }
  .tag.cat-rapport-building{ background:#FCEFD8; color:#9A6511; }
  .tag.cat-adls{ background:var(--blue-light); color:#1B4A78; }
  .tag.cat-cleaning{ background:#DFF6F1; color:#128A76; }
  .tag.cat-activities{ background:#FDE6EE; color:#B8285E; }
  .tag.cat-appointments{ background:#FFF1CC; color:#8A5A00; }
  .tag.cat-house-activity-2-clients-{ background:#DCEEDD; color:#1F6F3A; }
  .tag.cat-household{ background:#EEF0F4; color:#4B5563; }
  .tag.cat-other{ background:#F3E8FD; color:#7C3AED; }

  .empty{ color:var(--ink-soft); font-size:13.5px; padding:10px 4px; }

  .submit-bar{
    position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 16px; display:flex; gap:10px; align-items:center; z-index:30;
    box-shadow:0 -6px 18px rgba(31,41,55,0.06);
  }
  .submit-bar .count{ font-size:12.5px; color:var(--ink-soft); flex:1; }
  button.primary{
    background:var(--blue); color:#fff; border:none; border-radius:11px; padding:13px 20px;
    font-size:15px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer;
  }
  button.primary:disabled{ background:#B9C7D9; cursor:not-allowed; }
  button.ghost{
    background:transparent; border:1.5px solid var(--line); color:var(--ink); border-radius:10px;
    padding:9px 14px; font-size:13.5px; font-weight:600; cursor:pointer;
  }
  button.small{
    background:var(--blue); color:#fff; border:none; border-radius:8px; padding:8px 12px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  button.danger-text{
    background:none; border:none; color:#B4483A; font-size:12.5px; font-weight:600; cursor:pointer; padding:4px;
  }

  /* Stamp confirmation */
  .stamp-wrap{ text-align:center; padding:20px 8px 6px; }
  .stamp{
    width:150px; height:150px; border-radius:50%; border:3px dashed var(--teal);
    display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
    transform:rotate(-8deg); color:var(--teal);
  }
  .stamp .inner{ text-align:center; line-height:1.3; }
  .stamp .inner .b1{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; letter-spacing:.05em;}
  .stamp .inner .b2{ font-family:'Fraunces',serif; font-weight:700; font-size:20px; margin:2px 0;}
  .stamp .inner .b3{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; }

  .admin-row{ display:flex; gap:8px; margin-bottom:10px; }
  .admin-row > *{ flex:1; }
  .obj-admin-item{
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
    padding:10px 2px; border-top:1px solid var(--line);
  }
  .obj-admin-item:first-of-type{ border-top:none; }
  .days-pick{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .day-chip{
    border:1.5px solid var(--line); border-radius:8px; padding:6px 0; width:38px; text-align:center;
    font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink-soft);
  }
  .day-chip.on{ background:var(--blue); border-color:var(--blue); color:#fff; }

  .review-entry{ border-top:1px solid var(--line); padding:12px 2px; }
  .review-summary-btn{
    display:flex; justify-content:space-between; align-items:center; width:100%;
    background:none; border:none; padding:4px 0; cursor:pointer; text-align:left; font-family:'Inter',sans-serif;
  }
  .review-chevron{ font-size:13px; color:var(--ink-soft); flex-shrink:0; margin-left:10px; }
  .review-entry:first-of-type{ border-top:none; }
  .review-entry .who{ font-weight:700; font-size:14.5px; }
  .review-entry .when{ font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }
  .review-entry ul{ margin:8px 0 0; padding-left:18px; font-size:13.5px; }
  .review-entry li.skipped{ color:#B4483A; }
  .review-entry li.unmarked{ color:var(--ink-soft); }

  .hint{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin-top:6px;}
  .divider{ height:1px; background:var(--line); margin:16px 0; }

  /* Admin gate — deliberately distinct from staff/home password screens */
  .admin-gate{
    background:#12212F; color:#EAF1F8; border-radius:18px; padding:36px 24px;
    text-align:center; margin-top:6px; box-shadow:var(--shadow);
  }
  .admin-gate-icon{ font-size:30px; margin-bottom:10px; }
  .admin-gate-title{ font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:#fff; }
  .admin-gate-sub{ font-size:13px; color:#9FB3C4; margin:6px 0 20px; }
  .admin-gate-input{
    width:100%; max-width:280px; padding:12px 14px; border-radius:10px; border:1.5px solid #2F4B60;
    background:#0B1822; color:#fff; font-size:15px; text-align:center; letter-spacing:.05em;
  }
  .admin-gate-input:focus{ outline:2px solid var(--amber); border-color:var(--amber); }
  .admin-gate-error{ color:#F0A28C; font-size:12.5px; margin-top:8px; }
  .admin-gate-btn{
    display:block; margin:16px auto 0; background:var(--amber); color:#12212F; border:none;
    border-radius:10px; padding:12px 22px; font-size:14.5px; font-weight:700; cursor:pointer;
    font-family:'Inter',sans-serif;
  }

  /* Admin shell — distinct dark theme applied throughout Manage & Review, never seen by staff */
  .admin-shell{ background:#0F1E2A; padding:12px; border-radius:18px; margin-top:6px; color:#E8EEF5; }
  .admin-shell .card{ background:#16283A; border-color:#26415A; }
  .admin-shell h3{ color:#fff; }
  .admin-shell .field-label{ color:#8FA9C2; }
  .admin-shell input[type=text], .admin-shell input[type=date], .admin-shell input[type=month],
  .admin-shell input[type=file], .admin-shell select, .admin-shell textarea{
    background:#0F1E2A; border-color:#2C4A63; color:#EAF1F8;
  }
  .admin-shell .obj-text, .admin-shell .who{ color:#EAF1F8; }
  .admin-shell .hint, .admin-shell .when{ color:#7C93AB; }
  .admin-shell .home-pick{ background:#0F1E2A; border-color:#2C4A63; }
  .admin-shell .home-pick.selected{ background:#1F3A52; border-color:var(--amber); }
  .admin-shell.theme-parsley{ background:#0D2138; }
  .admin-shell.theme-parsley .card{ background:#16324D; border-color:#2C5478; }
  .admin-shell.theme-parsley input[type=text], .admin-shell.theme-parsley input[type=date],
  .admin-shell.theme-parsley input[type=month], .admin-shell.theme-parsley input[type=time],
  .admin-shell.theme-parsley input[type=password], .admin-shell.theme-parsley input[type=file],
  .admin-shell.theme-parsley input[type=number],
  .admin-shell.theme-parsley select, .admin-shell.theme-parsley textarea{ background:#0D2138; border-color:#2C5478; color:#fff; color-scheme:dark; }
  .admin-shell.theme-parsley .home-pick{ background:#0D2138; border-color:#2C5478; }
  .admin-shell.theme-parsley .home-pick.selected{ background:#1E4266; border-color:#6BAAEF; }
  .admin-shell.theme-parsley .category-subgroup-label{ color:#6BAAEF; border-color:#2C5478; }
  .admin-shell.theme-parsley .ghost{ border-color:#2C5478; }
  .admin-shell.theme-parsley .day-chip{ background:#0D2138; border-color:#2C5478; }
  .admin-shell.theme-parsley .review-entry, .admin-shell.theme-parsley .obj-admin-item{ border-color:#2C5478; }

  .admin-shell.theme-somo{ background:#211533; }
  .admin-shell.theme-somo .card{ background:#2E1F4D; border-color:#4A3577; }
  .admin-shell.theme-somo input[type=text], .admin-shell.theme-somo input[type=date],
  .admin-shell.theme-somo input[type=month], .admin-shell.theme-somo input[type=time],
  .admin-shell.theme-somo input[type=password], .admin-shell.theme-somo input[type=file],
  .admin-shell.theme-somo input[type=number],
  .admin-shell.theme-somo select, .admin-shell.theme-somo textarea{ background:#211533; border-color:#4A3577; color:#fff; color-scheme:dark; }
  .admin-shell.theme-somo .home-pick{ background:#211533; border-color:#4A3577; }
  .admin-shell.theme-somo .home-pick.selected{ background:#3D2A63; border-color:#C4A0F5; }
  .admin-shell.theme-somo .category-subgroup-label{ color:#C4A0F5; border-color:#4A3577; }
  .admin-shell.theme-somo .ghost{ border-color:#4A3577; }
  .admin-shell.theme-somo .day-chip{ background:#211533; border-color:#4A3577; }
  .admin-shell.theme-somo .review-entry, .admin-shell.theme-somo .obj-admin-item{ border-color:#4A3577; }
  .admin-shell .h-name{ color:#fff; }
  .admin-shell .h-res{ color:#7C93AB; }
  .admin-shell .ghost{ border-color:#2C4A63; color:#EAF1F8; background:transparent; }
  .admin-shell button.small{ background:var(--amber); color:#12212F; }
  .admin-shell .danger-text{ color:#F0A28C; }
  .admin-shell .day-chip{ background:#0F1E2A; border-color:#2C4A63; color:#8FA9C2; }
  .admin-shell .day-chip.on{ background:var(--amber); border-color:var(--amber); color:#12212F; }
  .admin-shell .review-entry{ border-color:#26415A; }
  .admin-shell .review-entry ul{ color:#EAF1F8; }
  .admin-shell .review-entry li.skipped{ color:#F0A28C; }
  .admin-shell .review-entry li.unmarked{ color:#7C93AB; }
  .admin-shell .review-chevron{ color:#7C93AB; }
  .delete-review-btn{
    background:none; border:1.5px solid #B4483A; color:#F0A28C; border-radius:8px;
    padding:6px 12px; font-size:12.5px; font-weight:600; cursor:pointer; margin-top:10px;
  }
  .admin-shell .empty{ color:#7C93AB; }
  .admin-shell .obj-admin-item{ border-color:#26415A; }
  .admin-success{
    background:#173226; border:1px solid #2BBFAA; color:#8DEBD8; border-radius:10px;
    padding:10px 14px; font-size:13.5px; font-weight:600; margin-bottom:12px;
  }
</style>
</head>

function todayStr(d){
  const x = d || new Date();
  const y = x.getFullYear();
  const mo = String(x.getMonth()+1).padStart(2,'0');
  const da = String(x.getDate()).padStart(2,'0');
  return `${y}-${mo}-${da}`;
}
function todayLabel(){ return new Date().toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'}); }
function weekday(){ return new Date().getDay(); }
// AM shift: 9:00 AM – 3:00 PM. PM shift: 3:00 PM – 9:30 PM.
// The 3:00 PM boundary is what actually decides it — before 3pm is AM, at/after 3pm is PM.
function getCurrentShift(){
  const now = new Date();
  return now.getHours() < 15 ? 'AM' : 'PM';
}
// Same 3:00 PM boundary, but applied to a specific HH:MM time value someone entered,
// rather than the current clock — used to auto-detect an objective's shift from its time.
function shiftFromTime(hhmm){
  if(!hhmm) return null;
  const h = parseInt(hhmm.split(':')[0], 10);
  return h < 15 ? 'AM' : 'PM';
}

function parseYMD(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function formatYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// Core recurrence check, ignoring the end condition (used both for "does it occur today"
// and for counting past occurrences toward an "ends after N times" limit).
function occursOnBase(o, dateStr){
  const freq = o.freq || 'week';
  const interval = o.interval && o.interval > 0 ? o.interval : 1;
  const anchor = o.startDate || null;
  const testDate = parseYMD(dateStr);

  if(freq === 'week'){
    if(getRotationDayMode(o)){
      if(!anchor) return false;
      const anchorDate = parseYMD(anchor);
      if(testDate < anchorDate) return false;
      const diffDays = Math.round((testDate - anchorDate) / 86400000);
      const weekIndex = Math.floor(diffDays / 7);
      const turnIndex = weekIndex % o.rotationStaff.length;
      const entryDay = rotationEntryDay(o.rotationStaff[turnIndex]);
      if(entryDay === null || entryDay === undefined) return false;
      return testDate.getDay() === entryDay;
    }
    const days = (o.days && o.days.length) ? o.days : null;
    if(days && !days.includes(testDate.getDay())) return false;
    if(!anchor) return true; // no anchor set — behaves like the original simple weekly pattern
    const anchorDate = parseYMD(anchor);
    if(testDate < anchorDate) return false;
    if(interval <= 1) return true;
    const diffDays = Math.round((testDate - anchorDate) / 86400000);
    const diffWeeks = Math.floor(diffDays / 7);
    return diffWeeks % interval === 0;
  }
  if(freq === 'day'){
    if(!anchor) return interval <= 1;
    const anchorDate = parseYMD(anchor);
    if(testDate < anchorDate) return false;
    const diffDays = Math.round((testDate - anchorDate) / 86400000);
    return diffDays % interval === 0;
  }
  if(freq === 'month'){
    if(!anchor) return false;
    const anchorDate = parseYMD(anchor);
    if(testDate < anchorDate) return false;
    if(testDate.getDate() !== anchorDate.getDate()) return false;
    const monthsDiff = (testDate.getFullYear()-anchorDate.getFullYear())*12 + (testDate.getMonth()-anchorDate.getMonth());
    return monthsDiff >= 0 && monthsDiff % interval === 0;
  }
  if(freq === 'year'){
    if(!anchor) return false;
    const anchorDate = parseYMD(anchor);
    if(testDate < anchorDate) return false;
    if(testDate.getMonth()!==anchorDate.getMonth() || testDate.getDate()!==anchorDate.getDate()) return false;
    const yearsDiff = testDate.getFullYear() - anchorDate.getFullYear();
    return yearsDiff % interval === 0;
  }
  return true;
}

// Counts how many times an objective has occurred from its anchor date up through
// (and including) targetDateStr — used for "ends after N occurrences."
function countOccurrencesUpTo(o, targetDateStr){
  const anchor = o.startDate;
  if(!anchor) return 1;
  const start = parseYMD(anchor);
  const target = parseYMD(targetDateStr);
  if(target < start) return 0;
  let count = 0;
  const cursor = new Date(start);
  let iterations = 0;
  while(cursor <= target && iterations < 1100){
    if(occursOnBase(o, formatYMD(cursor))) count++;
    cursor.setDate(cursor.getDate()+1);
    iterations++;
  }
  return count;
}

// Figures out whose turn it is on a given date by counting which occurrence
// this is (1st, 2nd, 3rd...) and cycling through the rotation list in order.
// True if this rotation has per-person days assigned (Option A: each person's
// own day) rather than everyone sharing the objective's single "days" field.
function getRotationDayMode(o){
  if((o.freq || 'week') !== 'week') return false; // day-of-week rotation only makes sense for weekly objectives
  return !!(o.rotationStaff && o.rotationStaff.length && o.rotationStaff.some(e => typeof e === 'object' && e.day !== null && e.day !== undefined));
}
function rotationEntryName(entry){ return typeof entry === 'string' ? entry : entry.name; }
function rotationEntryDay(entry){ return typeof entry === 'string' ? null : entry.day; }

function getRotationTurn(o, dateStr){
  if(!o.rotationStaff || o.rotationStaff.length === 0) return null;
  if(getRotationDayMode(o)){
    if(!o.startDate) return null;
    const anchor = parseYMD(o.startDate);
    const target = parseYMD(dateStr);
    if(target < anchor) return null;
    const diffDays = Math.round((target - anchor) / 86400000);
    const weekIndex = Math.floor(diffDays / 7);
    const turnIndex = weekIndex % o.rotationStaff.length;
    return rotationEntryName(o.rotationStaff[turnIndex]);
  }
  const occurrenceNumber = countOccurrencesUpTo(o, dateStr);
  if(occurrenceNumber <= 0) return null;
  const idx = (occurrenceNumber - 1) % o.rotationStaff.length;
  return rotationEntryName(o.rotationStaff[idx]);
}

// The single source of truth for "should this objective show up today" —
// used everywhere instead of duplicating filter logic.
function objectiveAppliesToday(o, todayStr){
  if(o.date) return o.date === todayStr; // one-time objective, unchanged behavior
  if(!occursOnBase(o, todayStr)) return false;
  if(o.month && todayStr.slice(0,7) !== o.month) return false; // legacy "only this month" field
  const endType = o.endType || 'never';
  if(endType === 'date' && o.endDate && todayStr > o.endDate) return false;
  if(endType === 'count' && o.endCount){
    const idx = countOccurrencesUpTo(o, todayStr);
    if(idx === 0 || idx > o.endCount) return false;
  }
  return true;
}
function describeRecurrence(o){
  if(o.date) return o.date + ' only';
  const interval = o.interval || 1;
  const freq = o.freq || 'week';
  const unit = { day:'day', week:'week', month:'month', year:'year' }[freq];
  let base;
  if(interval === 1){
    if(freq==='week' && o.days && o.days.length){
      base = 'Every ' + o.days.map(d=>DAY_LABELS[d]).join(', ');
    } else {
      base = 'Every ' + unit;
    }
  } else {
    base = `Every ${interval} ${unit}s`;
    if(freq==='week' && o.days && o.days.length) base += ' on ' + o.days.map(d=>DAY_LABELS[d]).join(', ');
  }
  if(o.startDate) base += ' · starts ' + o.startDate;
  const endType = o.endType || 'never';
  if(endType==='date' && o.endDate) base += ' · ends ' + o.endDate;
  if(endType==='count' && o.endCount) base += ` · ends after ${o.endCount}×`;
  if(o.month) base += ' · '+o.month+' only';
  return base;
}

function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function formatDescription(text){
  if(!text) return '';
  // Turn "* " bullet markers into their own line, on top of preserving any real
  // line breaks already in the text (handled separately via CSS white-space:pre-wrap).
  const withBreaks = text.replace(/\s*\*\s+/g, '\n• ').trim();
  return esc(withBreaks);
}
function formatTime12(hhmm){
  if(!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  const hour12 = ((h+11)%12)+1;
  const ampm = h < 12 ? 'AM' : 'PM';
  return `${hour12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function formatTimeRange(start, end){
  if(!start) return '';
  if(!end) return formatTime12(start);
  const [h1,m1] = start.split(':').map(Number);
  const [h2,m2] = end.split(':').map(Number);
  const ampm1 = h1 < 12 ? 'AM' : 'PM';
  const ampm2 = h2 < 12 ? 'AM' : 'PM';
  const hour1 = ((h1+11)%12)+1;
  const hour2 = ((h2+11)%12)+1;
  // Drop the first AM/PM if both sides match, like "4:25-5:00 PM"
  if(ampm1 === ampm2){
    return `${hour1}:${String(m1).padStart(2,'0')}–${hour2}:${String(m2).padStart(2,'0')} ${ampm2}`;
  }
  return `${hour1}:${String(m1).padStart(2,'0')} ${ampm1}–${hour2}:${String(m2).padStart(2,'0')} ${ampm2}`;
}

  for(const d of days){
    const checkins = await getCheckins(homeKey, d);
    Object.values(checkins).forEach(c => { ensure(c.displayName).checkins += 1; });
    const subs = await getSubmissions(homeKey, d);
    subs.forEach(s => {
      const rec = ensure(s.staffName);
      rec.doneItems += s.doneItems;
      rec.totalItems += s.totalItems;
    });
  }
  const trips = await getMileageTrips(homeKey);
  trips.filter(t => days.includes(t.date)).forEach(t => { ensure(t.staffName).miles += t.miles; });
  return Object.values(byStaff).sort((a,b)=> b.checkins - a.checkins);
}

async function extractCalendarFromPhoto(){
  let statusEl;
  try{
    const fileInput = document.getElementById('calendarFileInput');
    statusEl = document.getElementById('calendarStatus');
    if(!fileInput) throw new Error("Couldn't find the file picker — try reopening this page.");
    const file = fileInput.files[0];
    if(!file){ statusEl.textContent = 'Choose a photo first.'; return; }
    statusEl.textContent = 'Reading the calendar…';
    const base64 = await new Promise((res, rej)=>{
      const r = new FileReader();
      r.onload = ()=>res(r.result.split(',')[1]);
      r.onerror = ()=>rej(new Error('Could not read that file.'));
      r.readAsDataURL(file);
    });
    const mediaType = file.type || 'image/jpeg';
    if(!getApiKey()) throw new Error('Add your Anthropic API key at the top of this page first.');
    const fetchPromise = fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: anthropicHeaders(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            { type:'image', source: { type:'base64', media_type: mediaType, data: base64 } },
            { type:'text', text: `This is a photo of a monthly calendar for a residential care home. Today's date is ${todayStr()}. Read every event, task, appointment, or note written on the calendar. Return ONLY a raw JSON array, no markdown fences, no prose, with one object per calendar item using this shape:
{"date":"YYYY-MM-DD","title":"short task title (a few words)","description":"a sentence or two with how-to details — specific instructions, an address, a time, or context staff would need, if evident; empty string if nothing beyond the title","category":"Rapport Building|ADLs|Cleaning|Activities|Appointments|Household|Other","scope":["array of one or more resident full names if the item is clearly about specific residents, otherwise [\"__general__\"]"]}
Infer the year from context if not shown (use ${todayStr().slice(0,4)} unless the calendar clearly shows another year). If a date is illegible, omit that item rather than guessing. Return an empty array if nothing is legible.` }
          ]
        }]
      })
    });
    const timeoutPromise = new Promise((_, rej)=>setTimeout(()=>rej(new Error('TIMEOUT')), 30000));
    const response = await Promise.race([fetchPromise, timeoutPromise]);
    if(!response.ok){
      throw new Error(`AI request failed (status ${response.status}). Try again in a moment.`);
    }
    const data = await response.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const cleaned = textBlocks.replace(/```json|```/g,'').trim();
    let parsed = [];
    try{ parsed = JSON.parse(cleaned); }catch(e){ throw new Error('Could not read the calendar clearly. Try a clearer, well-lit photo.'); }
    state.calendarUpload.source = 'photo';
    state.calendarUpload.proposals = parsed.map(p=>({
      mode:'onetime', date: p.date || '', days:[], month:'', shift:'AM', time: p.time || '',
      title: p.title || '', description: p.description || '', category: CATEGORIES.includes(p.category)?p.category:'Other',
      scope: Array.isArray(p.scope) ? p.scope : [p.scope || '__general__'], include: true
    }));
    statusEl.textContent = parsed.length ? `Found ${parsed.length} item(s) — review below before adding.` : 'No legible items were found on that photo.';
  }catch(e){
    const msg = (e && e.message==='TIMEOUT') ? 'That took too long and timed out. Try again.' : ((e && e.message) || 'Something went wrong reading that photo. Try again.');
    if(statusEl) statusEl.textContent = msg;
  }
  render();
}

async function runDiagnostics(){
  state.diagRunning = true;
  state.diagResult = null;
  render();
  const lines = [];

  // Test 1: Firestore round-trip
  try{
    const testId = 'diagtest_'+Date.now();
    await setDoc(doc(db, 'diagnostics', testId), { ok:true, at: new Date().toISOString() });
    const snap = await getDoc(doc(db, 'diagnostics', testId));
    if(snap.exists() && snap.data().ok === true){
      lines.push('✓ Firestore: write and read both worked.');
    } else {
      lines.push('✗ Firestore: wrote successfully but read back something unexpected.');
    }
  }catch(e){
    lines.push('✗ Firestore: failed — '+(e && e.message ? e.message : String(e)));
  }

  // Test 2: is an API key saved?
  if(!getApiKey()){
    lines.push('✗ Anthropic API key: none saved yet — add one at the top of this page.');
  } else {
    lines.push('✓ Anthropic API key: one is saved on this device.');
    // Test 3: can we reach the AI endpoint with it?
    try{
      const fetchPromise = fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers: anthropicHeaders(),
        body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens: 20, messages:[{role:'user', content:'Reply with exactly: OK'}] })
      });
      const timeoutPromise = new Promise((_, rej)=>setTimeout(()=>rej(new Error('TIMEOUT')), 15000));
      const resp = await Promise.race([fetchPromise, timeoutPromise]);
      if(!resp.ok){
        const body = await resp.text();
        lines.push(`✗ AI connection: request reached the server but failed (HTTP ${resp.status}). ${body.slice(0,200)}`);
      } else {
        const data = await resp.json();
        const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join(' ').trim();
        lines.push('✓ AI connection: worked. Response: '+(text || '(empty)'));
      }
    }catch(e){
      const msg = (e && e.message==='TIMEOUT') ? 'timed out after 15 seconds' : ((e && e.message) || String(e));
      lines.push('✗ AI connection: failed — '+msg);
    }
  }

  state.diagResult = lines.join('\n');
  state.diagRunning = false;
  render();
}

  if(lastNote && lastNote.text && lastNoteAgeHours < 28){
    html += `<div class="card" style="border-left:4px solid var(--amber);">
      <label class="field-label">Note from last shift</label>
      <div style="font-size:14.5px; line-height:1.5;">${esc(lastNote.text)}</div>
      <div class="hint" style="margin-top:6px;">— ${esc(lastNote.staffName)}, ${new Date(lastNote.timestamp).toLocaleString()}</div>
    </div>`;
  }

  const roster = await getStaffRoster();
  html += `<div class="card">
      <label class="field-label">Your name</label>
      <select id="staffNameInput">
        <option value="" ${!state.staffName?'selected':''}>Choose your name…</option>
        ${roster.map(name=>`<option value="${esc(name)}" ${state.staffName===name?'selected':''}>${esc(name)}</option>`).join('')}
      </select>
      ${roster.length===0 ? `<div class="hint" style="margin-top:6px; color:#B4483A;">No staff have been added to the roster yet — ask your admin to add you under Manage Objectives.</div>` : ''}
      <label class="field-label" style="margin-top:12px;">Which shift are you working?</label>
      <div class="days-pick">
        ${SHIFTS.map(s=>`<div class="day-chip ${state.shift===s?'on':''}" data-shift="${s}" style="width:70px;">${s}</div>`).join('')}
      </div>
      ${(state.staffName && state.staffName.trim() && state.shift) ? `<div class="checkin-badge">🟢 Checked in as ${esc(state.staffName)} — ${state.shift} shift</div>` : ''}
      ${await onShiftWithHTML()}
      <div class="hint">${todayLabel()} — objectives below are for today's date and the shift you pick.</div>
    </div>`;

  // Record the check-in once per session, as soon as both a name and a shift are set.
  // Fired without blocking rendering — if it fails, the flag resets so it retries next render.
  const checkinKey = state.staffName && state.staffName.trim() && state.shift ? (state.staffName.trim().toLowerCase()+'_'+state.shift) : null;
  if(checkinKey && state.checkedInRecorded !== checkinKey){
    state.checkedInRecorded = checkinKey;
    recordCheckin(state.home, todayStr(), state.staffName.trim(), state.shift).catch(()=>{ if(state.checkedInRecorded===checkinKey) state.checkedInRecorded = null; });
  }

  if(!state.shift) return html;

  const todayForLock = todayStr();
  const existingSubs = await getSubmissions(state.home, todayForLock);
  const myNameNorm = (state.staffName||'').trim().toLowerCase();
  const alreadyDone = myNameNorm ? existingSubs.find(s => s.shift === state.shift && (s.staffName||'').trim().toLowerCase() === myNameNorm) : null;
  if(alreadyDone){
    return html + lockedShiftHTML(alreadyDone) + addendumHTML(alreadyDone) + await mileageFormHTML();
  }

  html += `<div class="today-banner">
      <div class="today-banner-label">Objectives for Today</div>
      <div class="today-banner-date">${todayLabel()}</div>
    </div>`;

  html += `<div id="scrollIndicator" class="scroll-indicator">Keep scrolling ↓</div>`;

  // scroll-prompt removed, replaced by persistent live scroll indicator

  const adminNotes = await getAdminNotes(state.home);
  if(adminNotes[state.shift]){
    html += `<div class="card" style="border-left:4px solid var(--blue); background:#EEF4FC;">
      <label class="field-label">📌 Note from admin — ${state.shift} shift</label>
      <div style="font-size:15px; line-height:1.5; font-weight:700; color:var(--ink);">${esc(adminNotes[state.shift])}</div>
    </div>`;
  }

  const objectives = await getObjectives(state.home);
  const today = todayStr();
  const skippedIds = await getSkippedToday(state.home, today);
  const todays = objectives.filter(o =>
    objectiveAppliesToday(o, today) &&
    (o.shift===state.shift || !!o.time) &&
    !skippedIds.includes(o.id)
  );
  const home = HOMES[state.home];
  const groups = [...home.residents, '__general__'];

  let totalItems = 0, doneItems = 0;

  const liveStatus = await getLiveStatus(state.home, todayForLock);
  const startedStatus = await getStartedStatus(state.home, todayForLock);

  // Needs Attention: anything with a specific time that has already passed and isn't marked Completed yet
  const nowHM = (()=>{ const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); })();
  const overdue = todays.filter(o => o.time && ((o.timeEnd || o.time) < nowHM) && !liveStatus[o.id] && (!state.objStatus[o.id] || state.objStatus[o.id].status !== 'completed'));
  if(overdue.length){
    html += `<div class="card needs-attention">
      <label class="field-label" style="color:#B4483A;">⚠ Needs attention — time has passed</label>
      ${overdue.map(o=>objItemHTML(o, liveStatus, startedStatus)).join('')}
    </div>`;
  }

  const clientProfiles = await getClientProfiles(state.home);

  for(const g of groups){
    const items = todays.filter(o=>o.scope.includes(g));
    const profile = g!=='__general__' ? clientProfiles[g] : null;
    const hasProfileContent = !!(profile && (profile.photo || (profile.dos&&profile.dos.length) || (profile.avoids&&profile.avoids.length) || (profile.redirection&&profile.redirection.length) || profile.communicationStyle || profile.interests || profile.foodLikes || profile.foodDislikes || profile.otherNotes));
    if(items.length===0 && !hasProfileContent) continue;
    totalItems += items.length;
    const doneCount = items.filter(o=>state.objStatus[o.id] && state.objStatus[o.id].status==='completed').length;
    doneItems += doneCount;
    const pct = items.length ? Math.round(100*doneCount/items.length) : 0;
    // Sub-group this resident's items by category, in the app's defined category order
    const byCategory = CATEGORIES.map(cat => ({ cat, catItems: items.filter(o=>o.category===cat) })).filter(x=>x.catItems.length);
    const cheatOpen = state.staffProfileOpen[g];
    html += `<div class="card resident-block">
      ${profile ? `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          ${profile.photo ? `<img src="${profile.photo}" style="width:64px; height:64px; border-radius:50%; object-fit:cover; flex-shrink:0;">` : ''}
          <div>
            <h3 style="margin-bottom:2px;">${esc(g)}</h3>
            ${(profile.dos&&profile.dos.length)||(profile.avoids&&profile.avoids.length) ? `<button type="button" class="cheat-sheet-link" data-togglecheat="${esc(g)}">📋 ${cheatOpen ? 'Hide' : 'View'} cheat sheet</button>` : ''}
          </div>
        </div>
        ${cheatOpen ? cheatSheetHTML(profile) : ''}
      ` : `<h3>${g==='__general__' ? 'General / Household' : g}</h3>`}
      ${items.length ? `
        <div class="resident-progress"><div style="width:${pct}%"></div></div>
        ${byCategory.map(({cat, catItems})=>`
          <div class="category-subgroup">
            <div class="category-subgroup-label">${cat}</div>
            ${catItems.map(o=>objItemHTML(o, liveStatus, startedStatus)).join('')}
          </div>`).join('')}
      ` : (hasProfileContent ? `<div class="hint">No objectives scheduled for ${esc(g)} today.</div>` : '')}
    </div>`;
  }

  // recompute totals across ALL today's items once (avoids double-count from the Needs Attention banner re-listing items)
  totalItems = todays.length;
  doneItems = todays.filter(o=>state.objStatus[o.id] && state.objStatus[o.id].status==='completed').length;

  if(totalItems===0){
    html += `<div class="card empty">No objectives are scheduled for today at ${home.name}. Add some under "Manage objectives."</div>`;
  }

  html += await mileageFormHTML();

  html += `<div class="card">
      <label class="field-label">Anything staff should know for the next shift</label>
      <textarea id="notesInput" rows="3">${esc(state.notes)}</textarea>
    </div>`;

  html += `<div class="submit-bar">
      <div class="count">${doneItems}/${totalItems} done</div>
      <button class="primary" id="submitShiftBtn" ${!state.staffName || totalItems===0 ? 'disabled':''}>Submit &amp; leave</button>
    </div>`;

  return html;
}

async function onShiftWithHTML(){
  if(!state.staffName || !state.staffName.trim() || !state.shift) return '';
  const myNameNorm = state.staffName.trim().toLowerCase();
  const checkins = await getCheckins(state.home, todayStr());
  const others = Object.values(checkins).filter(c =>
    c.shift === state.shift && (c.displayName||'').trim().toLowerCase() !== myNameNorm
  );
  if(others.length === 0) return '';
  const names = others.map(c => esc(c.displayName)).join(', ');
  return `<div class="checkin-badge" style="background:#EEF4FC; color:#1B4A78;">👥 Currently on shift with you: ${names}</div>`;
}

function wireStaff(){
  const backToAdminBtn = document.getElementById('backToAdminBtn');
  if(backToAdminBtn) backToAdminBtn.onclick = ()=>{
    state.previewingAsAdmin = false;
    state.tab = 'admin';
    state.home = null;
    state.shift = null;
    state.staffName = '';
    state.objStatus = {};
    render();
  };
  document.querySelectorAll('.home-pick').forEach(b=>{
    b.onclick = ()=>{ state.home = b.dataset.home; state.shift=null; state.objStatus={}; state.submitted=false; state.checkedInRecorded=null; render(); };
  });
  if(state.home && !state.unlocked[state.home]){ wirePasswordGate(state.home, render); return; }
  document.querySelectorAll('[data-togglecheat]').forEach(b=>{
    b.onclick = ()=>{
      const name = b.dataset.togglecheat;
      state.staffProfileOpen[name] = !state.staffProfileOpen[name];
      render();
    };
  });
  document.querySelectorAll('[data-shift]').forEach(chip=>{
    chip.onclick = ()=>{ state.shift = chip.dataset.shift; render(); };
  });
  const nameInput = document.getElementById('staffNameInput');
  if(nameInput) nameInput.onchange = (e)=>{ state.staffName = e.target.value; refreshSubmitState(); render(); };
  document.querySelectorAll('[data-startobj]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.startobj;
      const name = (state.staffName||'').trim();
      if(!name){ state.staffError = 'Choose your name at the top first.'; render(); return; }
      btn.textContent = '…';
      btn.disabled = true;
      try{
        await saveStartedStatus(state.home, todayStr(), id, name);
        state.staffError = '';
        render();
      }catch(e){
        state.staffError = "Couldn't mark that as started — check your connection and try again.";
        render();
      }
    };
  });
  document.querySelectorAll('[data-statusobj]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.statusobj;
      const val = btn.dataset.statusval;
      const current = state.objStatus[id];
      // Tapping the already-active status again clears it back to unmarked
      if(current && current.status === val){
        delete state.objStatus[id];
        render();
        return;
      }
      state.objStatus[id] = { status: val, note: (current && current.note) || '' };
      render();
      // If this is a timed objective, sync immediately so the other shift sees it right away
      try{
        const objectives = await getObjectives(state.home);
        const obj = objectives.find(o=>o.id===id);
        if(obj && obj.time){
          await saveLiveStatus(state.home, todayStr(), id, val, state.objStatus[id].note, state.staffName || 'Unknown');
        }
      }catch(e){ /* non-critical — will still be captured at final submission */ }
    };
  });
  document.querySelectorAll('[data-reasonobj]').forEach(ta=>{
    ta.oninput = (e)=>{
      const id = e.target.dataset.reasonobj;
      if(!state.objStatus[id]) state.objStatus[id] = { status:'not_completed', note:'' };
      state.objStatus[id].note = e.target.value;
    };
    ta.onblur = async (e)=>{
      const id = e.target.dataset.reasonobj;
      try{
        const objectives = await getObjectives(state.home);
        const obj = objectives.find(o=>o.id===id);
        if(obj && obj.time && state.objStatus[id]){
          await saveLiveStatus(state.home, todayStr(), id, 'not_completed', state.objStatus[id].note, state.staffName || 'Unknown');
        }
      }catch(e){ /* non-critical */ }
    };
  });
  const notesEl = document.getElementById('notesInput');
  if(notesEl) notesEl.oninput = (e)=>{ state.notes = e.target.value; };
  const mileageCarEl = document.getElementById('mileageCar');
  if(mileageCarEl) mileageCarEl.oninput = (e)=>{ state.mileageForm.car = e.target.value; };
  const mileagePurposeEl = document.getElementById('mileagePurpose');
  if(mileagePurposeEl) mileagePurposeEl.oninput = (e)=>{ state.mileageForm.purpose = e.target.value; };
  const mileageScopeEl = document.getElementById('mileageScope');
  if(mileageScopeEl) mileageScopeEl.onchange = (e)=>{ state.mileageForm.scope = e.target.value; };
  const mileageStartEl = document.getElementById('mileageStartOdo');
  const mileageEndEl = document.getElementById('mileageEndOdo');
  const mileageMilesPreview = document.getElementById('mileageMilesPreview');
  const updateMilesPreview = ()=>{
    const mf = state.mileageForm;
    if(!mileageMilesPreview) return;
    if(mf.startOdo==='' || mf.endOdo==='' || isNaN(mf.startOdo) || isNaN(mf.endOdo)){
      mileageMilesPreview.textContent = '';
      return;
    }
    const miles = Number(mf.endOdo) - Number(mf.startOdo);
    mileageMilesPreview.textContent = miles < 0 ? '⚠ End reading is lower than start — check the numbers.' : `= ${miles} miles`;
  };
  if(mileageStartEl) mileageStartEl.oninput = (e)=>{ state.mileageForm.startOdo = e.target.value; updateMilesPreview(); };
  if(mileageEndEl) mileageEndEl.oninput = (e)=>{ state.mileageForm.endOdo = e.target.value; updateMilesPreview(); };
  const logTripBtn = document.getElementById('logTripBtn');
  if(logTripBtn) logTripBtn.onclick = async ()=>{
    const mf = state.mileageForm;
    if(!state.staffName){ state.mileageStatus = 'Enter your name at the top first.'; render(); return; }
    if(!mf.car || !mf.car.trim()){ state.mileageStatus = 'Enter your car first.'; render(); return; }
    if(mf.startOdo==='' || mf.endOdo==='' || isNaN(mf.startOdo) || isNaN(mf.endOdo)){ state.mileageStatus = 'Enter both odometer readings.'; render(); return; }
    const miles = Number(mf.endOdo) - Number(mf.startOdo);
    if(miles < 0){ state.mileageStatus = 'End reading must be higher than start reading.'; render(); return; }
    if(miles === 0){ state.mileageStatus = 'That trip shows 0 miles — double check the readings.'; render(); return; }
    try{
      const trips = [...(await getMileageTrips(state.home))];
      trips.push({
        id: 'trip'+Date.now(), staffName: state.staffName, car: mf.car.trim(),
        purpose: mf.purpose.trim(), scope: mf.scope,
        startOdo: Number(mf.startOdo), endOdo: Number(mf.endOdo), miles,
        date: todayStr(), timestamp: new Date().toISOString(), paid: false
      });
      await saveMileageTrips(state.home, trips);
      const cars = await getStaffCars(state.home);
      cars[state.staffName] = mf.car.trim();
      await saveStaffCars(state.home, cars);
      state.mileageForm = { car: mf.car.trim(), purpose:'', scope:'__general__', startOdo:'', endOdo:'' };
      state.mileageStatus = `✓ Logged ${miles} miles.`;
    }catch(e){
      state.mileageStatus = "Couldn't save that trip — check your connection and try again.";
    }
    render();
  };
  const submitBtn = document.getElementById('submitShiftBtn');
  if(submitBtn) submitBtn.onclick = doSubmit;
  const again = document.getElementById('newCheckinBtn');
  if(again) again.onclick = ()=>{ state.submitted=false; state.home=null; state.staffName=''; state.objStatus={}; state.notes=''; render(); };
  const addendumNameInput = document.getElementById('addendumNameInput');
  if(addendumNameInput) addendumNameInput.oninput = (e)=>{ state.staffName = e.target.value; };
  const addAddendumBtn = document.getElementById('addAddendumBtn');
  if(addAddendumBtn) addAddendumBtn.onclick = async ()=>{
    const nameVal = (document.getElementById('addendumNameInput')?.value || state.staffName || '').trim();
    const textVal = (document.getElementById('addendumTextInput')?.value || '').trim();
    if(!nameVal){ state.addendumStatus = 'Enter your name first.'; render(); return; }
    if(!textVal){ state.addendumStatus = 'Write something to add first.'; render(); return; }
    try{
      const subId = addAddendumBtn.dataset.addendumsub;
      const sub = state.lastSubmission && state.lastSubmission.id === subId ? state.lastSubmission
        : (await getSubmissions(state.home, todayStr())).find(s=>s.id===subId);
      if(!sub) throw new Error('not found');
      const updated = await addSubmissionAddendum(sub.home, sub.date, subId, textVal, nameVal);
      if(state.lastSubmission && state.lastSubmission.id === subId) state.lastSubmission = updated;
      state.addendumStatus = '✓ Added';
      state.staffError = '';
      render();
      setTimeout(()=>{ state.addendumStatus=''; render(); }, 1500);
    }catch(e){
      state.addendumStatus = "Couldn't save that — check your connection and try again.";
      render();
    }
  };
}

function refreshSubmitState(){
  const btn = document.getElementById('submitShiftBtn');
  if(btn) btn.disabled = !state.staffName;
}

async function doSubmit(){
  try{
    const objectives = await getObjectives(state.home);
    const today = todayStr();
    const skippedIds = await getSkippedToday(state.home, today);
    const todays = objectives.filter(o =>
      objectiveAppliesToday(o, today) &&
      (o.shift===state.shift || !!o.time) &&
      !skippedIds.includes(o.id)
    );
    const unmarked = todays.filter(o => !state.objStatus[o.id] || !state.objStatus[o.id].status);
    if(unmarked.length > 0){
      state.staffError = `Mark every objective as Completed or Not Completed before submitting — ${unmarked.length} still need${unmarked.length===1?'s':''} a status.`;
      render();
      return;
    }
    const items = todays.map(o=>{
      const st = state.objStatus[o.id];
      return {
        id:o.id, title:o.title, description:o.description, category:o.category, scope:o.scope,
        status: st ? st.status : 'unmarked',
        note: (st && st.status==='not_completed') ? (st.note||'') : '',
        done: !!(st && st.status==='completed')
      };
    });
    const doneItems = items.filter(i=>i.status==='completed').length;
    const record = {
      id: 'sub'+Date.now(),
      home: state.home,
      date: todayStr(),
      shift: state.shift,
      staffName: state.staffName,
      timestamp: new Date().toISOString(),
      items, doneItems, totalItems: items.length, notes: state.notes,
      addenda: []
    };
    const existing = await getSubmissions(state.home, record.date);
    existing.push(record);
    await saveSubmissions(state.home, record.date, existing);
    if(state.notes && state.notes.trim()){
      await saveLastNote(state.home, { text: state.notes.trim(), staffName: state.staffName, timestamp: record.timestamp });
    }
    state.submitted = true;
    state.lastSubmission = record;
    state.staffError = '';
  }catch(e){
    state.staffError = "Couldn't submit — check your connection and try again.";
  }
  render();
}

          ` : ''}

          <label class="field-label" style="margin-top:10px;">Shift</label>
          <div class="days-pick" id="editShiftPicker">
            ${SHIFTS.map(s=>`<div class="day-chip ${d.shift===s?'on':''}" data-editshift="${s}" style="width:60px;">${s}</div>`).join('')}
          </div>

          <label class="field-label" style="margin-top:10px;">Ends</label>
          <div class="admin-row">
            <button type="button" class="ghost" data-editendtype="never" style="flex:1; ${(!d.endType||d.endType==='never')?'background:var(--amber); color:#12212F; border-color:var(--amber);':''}">Never</button>
            <button type="button" class="ghost" data-editendtype="date" style="flex:1; ${d.endType==='date'?'background:var(--amber); color:#12212F; border-color:var(--amber);':''}">On date</button>
            <button type="button" class="ghost" data-editendtype="count" style="flex:1; ${d.endType==='count'?'background:var(--amber); color:#12212F; border-color:var(--amber);':''}">After N times</button>
          </div>
          ${d.endType==='date' ? `<input type="date" id="editEndDate" style="margin-top:8px;" value="${d.endDate||''}">` : ''}
          ${d.endType==='count' ? `<input type="number" min="1" id="editEndCount" style="margin-top:8px;" placeholder="Number of occurrences" value="${d.endCount||''}">` : ''}

          <label class="field-label" style="margin-top:14px;">Staff rotation (optional)</label>
          <div class="hint" style="margin-bottom:8px;">${(d.freq||'week')==='week' ? "Add staff in order, each with their own day (optional). It rotates through them week to week." : `Add staff in order — it rotates through them each time this repeats (every ${d.interval||1} ${d.freq||'week'}${(d.interval||1)===1?'':'s'}).`}</div>
          <div style="display:flex; gap:8px;">
            <select id="editRotationInput" style="flex:1;">
              <option value="" ${!d.rotationDraft?'selected':''}>Choose staff…</option>
              ${roster.map(name=>`<option value="${esc(name)}" ${d.rotationDraft===name?'selected':''}>${esc(name)}</option>`).join('')}
            </select>
            ${(d.freq||'week')==='week' ? `
              <select id="editRotationDay" style="flex-shrink:0;">
                ${DAY_LABELS.map((dl,i)=>`<option value="${i}" ${(d.rotationDayDraft===i)?'selected':''}>${dl}</option>`).join('')}
              </select>
            ` : ''}
            <button type="button" class="small" id="editAddRotationBtn" style="flex-shrink:0;">Add</button>
          </div>
          ${d.rotationStaff && d.rotationStaff.length ? `
            <div class="days-pick" style="margin-top:8px;">
              ${d.rotationStaff.map((entry,i)=>`<div class="day-chip on" style="width:auto; padding:6px 10px;">${i+1}. ${esc(rotationEntryName(entry))}${rotationEntryDay(entry)!==null && rotationEntryDay(entry)!==undefined ? ' ('+DAY_LABELS[rotationEntryDay(entry)]+')' : ''} <span data-editremoverotation="${i}" style="margin-left:6px; cursor:pointer; font-weight:700;">✕</span></div>`).join('')}
            </div>
          ` : ''}
        `}
        <label class="field-label" style="margin-top:10px;">Assigned to</label>
        <div class="days-pick" id="editScopePicker">
          <div class="day-chip ${d.scope.includes('__general__')?'on':''}" data-editscope="__general__" style="width:auto; padding:6px 10px;">General / Household</div>
          ${home.residents.map(r=>`<div class="day-chip ${d.scope.includes(r)?'on':''}" data-editscope="${esc(r)}" style="width:auto; padding:6px 10px;">${esc(r)}</div>`).join('')}
        </div>
        <button class="small" id="saveEditBtn" style="margin-top:12px;">Save changes</button>
        <button class="ghost" id="cancelEditBtn" style="margin-top:12px; margin-left:8px;">Cancel</button>
      </div>`;
    }
    return `
    <div class="obj-admin-item" style="display:flex; align-items:flex-start; gap:10px;">
      ${state.bulkMode ? `<input type="checkbox" data-bulkcheck="${o.id}" ${state.bulkSelected[o.id]?'checked':''} style="width:20px; height:20px; margin-top:2px; flex-shrink:0;">` : ''}
      <div style="flex:1;">
      <div style="display:flex; justify-content:space-between; gap:10px;">
        <div>
          ${o.timeSensitive ? `<span class="tag" style="background:#B4483A; color:#fff; font-weight:800;">TIME SENSITIVE</span>` : ''}
          ${o.time ? `<span class="tag" style="background:var(--blue-light); color:#1B4A78;">🕐 ${formatTimeRange(o.time, o.timeEnd)}</span>` : ''}
          <div class="obj-text">${esc(o.title)}</div>
          ${o.description ? `
            <button type="button" class="desc-toggle-btn" data-descid="${o.id}">${state.expandedDesc[o.id] ? '▾ Hide description' : '▸ Show description'}</button>
            ${state.expandedDesc[o.id] ? `<div class="obj-desc">${formatDescription(o.description)}</div>` : ''}
          ` : ''}
          ${objLinksHTML(o)}
          <div class="hint">${describeRecurrence(o)} · ${o.shift} shift</div>
          <div class="hint">Assigned to: ${o.scope.includes('__general__') ? 'General / Household' : o.scope.map(s=>esc(s)).join(', ')}</div>
          ${o.rotationStaff && o.rotationStaff.length ? `<div class="hint">🔁 Rotation: ${o.rotationStaff.map(entry => esc(rotationEntryName(entry)) + (rotationEntryDay(entry)!==null && rotationEntryDay(entry)!==undefined ? ' ('+DAY_LABELS[rotationEntryDay(entry)]+')' : '')).join(' → ')} · today's turn: <strong>${esc(getRotationTurn(o, todayStr()) || '—')}</strong></div>` : ''}
          ${o.assignedStaff ? `<div class="hint">👤 Assigned to: <strong>${esc(o.assignedStaff)}</strong></div>` : ''}
          ${skippedTodayIds.includes(o.id) ? `<div class="hint" style="color:#B4483A; font-weight:700;">⏭ Skipped for today</div>` : ''}
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0; align-items:flex-end;">
          <button class="ghost" style="padding:6px 12px; font-size:12.5px;" data-edit="${o.id}">Edit</button>
          <button class="ghost" style="padding:6px 12px; font-size:12.5px;" data-duplicate="${o.id}">Duplicate</button>
          ${objectiveAppliesToday(o, todayStr()) ? `<button class="ghost" style="padding:6px 12px; font-size:12.5px; ${skippedTodayIds.includes(o.id) ? 'background:var(--amber); color:#12212F; border-color:var(--amber);' : ''}" data-skiptoday="${o.id}">${skippedTodayIds.includes(o.id) ? 'Unskip' : 'Skip today'}</button>` : ''}
          <button class="danger-text" data-remove="${o.id}">Remove</button>
        </div>
      </div>
      </div>
    </div>`;
  };

  if(!groups.includes(state.manageTab)) state.manageTab = '__general__';
  html += `<div class="card" style="padding:8px;">
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      ${groups.map(g=>{
        const count = objectives.filter(o=>o.scope.includes(g)).length;
        const label = g==='__general__' ? 'General' : g.split(' ')[0];
        return `<button class="ghost" data-managetab="${esc(g)}" style="flex:1; min-width:90px; ${state.manageTab===g?'background:var(--amber); color:#12212F; border-color:var(--amber);':''}">${esc(label)} (${count})</button>`;
      }).join('')}
    </div>
  </div>`;

  const selectedGroup = state.manageTab;
  const selectedItems = objectives.filter(o=>o.scope.includes(selectedGroup));
  const selectedByCategory = CATEGORIES.map(cat => ({ cat, catItems: selectedItems.filter(o=>o.category===cat) })).filter(x=>x.catItems.length);
  html += `<div class="card">
    <h3>${selectedGroup==='__general__' ? 'General / Household' : selectedGroup}</h3>
    ${selectedItems.length===0 ? '<div class="empty">No objectives yet.</div>' : selectedByCategory.map(({cat, catItems})=>`
      <div class="category-subgroup">
        <div class="category-subgroup-label">${cat}</div>
        ${catItems.map(o=>renderAdminItem(o)).join('')}
      </div>`).join('')}
  </div>`;

  if(archivedObjectives.length){
    const archOpen = state.archiveOpen;
    html += `<div class="card">
      <button class="review-summary-btn" data-togglearchive="1">
        <span class="who">📦 Archived (${archivedObjectives.length} past objective${archivedObjectives.length===1?'':'s'})</span>
        <span class="review-chevron">${archOpen ? '▾' : '▸'}</span>
      </button>
      <div class="hint">One-time objectives whose date has passed. Kept here for review, hidden from the main list above.</div>
      ${archOpen ? `
        <ul style="margin:10px 0 0; padding-left:18px; font-size:13.5px;">
          ${archivedObjectives.slice().sort((a,b)=> b.date.localeCompare(a.date)).map(o=>`<li>${o.date} — ${esc(o.title)}${o.scope.includes('__general__')?'':' ('+o.scope.map(s=>esc(s)).join(', ')+')'}<button class="danger-text" data-deletearchived="${o.id}" style="margin-left:8px; font-size:12px;">Delete</button></li>`).join('')}
        </ul>
      ` : ''}
    </div>`;
  }

  return html;
}

    try{

      if(!roster.some(n=>n.trim().toLowerCase()===name.toLowerCase())){
        roster.push(name);

      }
      state.rosterNameDraft = '';
      state.actionError = '';
      render();

      state.actionError = "Couldn't add that staff member — check your connection and try again.";
      render();
    }
  };
  document.querySelectorAll('[data-removeroster]').forEach(b=>{
    b.onclick = async ()=>{
      try{
        const roster = await getStaffRoster();
        const filtered = roster.filter(n=>n!==b.dataset.removeroster);
        await saveStaffRoster(filtered);
        state.actionError = '';
        render();
      }catch(e){
        state.actionError = "Couldn't remove that staff member — check your connection and try again.";
        render();
      }

  const toggleBulkBtn = document.getElementById('toggleBulkModeBtn');

    state.bulkMode = !state.bulkMode;

    render();
  };
  document.querySelectorAll('[data-bulkcheck]').forEach(cb=>{
    cb.onchange = (e)=>{

      render();

  });
  const bulkCategorySelect = document.getElementById('bulkCategorySelect');

  const applyBulkCategoryBtn = document.getElementById('applyBulkCategoryBtn');

    if(!state.bulkCategoryChoice){ state.actionError = 'Pick a category first.'; render(); return; }
    try{
      const ids = Object.keys(state.bulkSelected).filter(id=>state.bulkSelected[id]);
      const list = [...(await getObjectives(state.adminHome))];
      const updated = list.map(o => ids.includes(o.id) ? { ...o, category: state.bulkCategoryChoice } : o);
      await saveObjectives(state.adminHome, updated);
      state.bulkMode = false; state.bulkSelected = {}; state.bulkCategoryChoice = ''; state.actionError = '';
      render();
    }catch(e){
      state.actionError = "Couldn't update those objectives — check your connection and try again.";
      render();
    }
  };
  const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');
  if(bulkDeleteBtn) bulkDeleteBtn.onclick = async ()=>{
    const ids = Object.keys(state.bulkSelected).filter(id=>state.bulkSelected[id]);
    if(ids.length===0) return;
    try{
      const list = [...(await getObjectives(state.adminHome))];
      const filtered = list.filter(o => !ids.includes(o.id));
      await saveObjectives(state.adminHome, filtered);
      state.bulkMode = false; state.bulkSelected = {}; state.actionError = '';
      render();
    }catch(e){
      state.actionError = "Couldn't delete those objectives — check your connection and try again.";
      render();
    }
  };
  document.querySelectorAll('[data-descid]').forEach(b=>{
    b.onclick = ()=>{

      state.expandedDesc[id] = !state.expandedDesc[id];

    b.onclick = ()=>{ state.archiveOpen = !state.archiveOpen; render(); };
  });
  document.querySelectorAll('[data-deletearchived]').forEach(b=>{

      try{
        const list = [...(await getObjectives(state.adminHome))];

async function renderMileage(){
  const rate = await getMileageRate();
  let html = `<div class="card">
    <h3 style="margin-bottom:6px;">Reimbursement rate</h3>
    <div class="hint" style="margin-bottom:10px;">What you pay per mile in cash. Defaults to the current IRS rate, but this is entirely yours to set.</div>
    <div style="display:flex; gap:8px; align-items:center;">
      <span style="font-size:15px;">$</span>
      <input type="number" step="0.01" id="mileageRateInput" value="${state.mileageRateDraft !== '' ? state.mileageRateDraft : rate}" style="max-width:120px;">
      <span class="hint">per mile</span>
      <button class="small" id="saveMileageRateBtn">Save</button>
    </div>
  </div>`;

  html += `<div class="card">
    <label class="field-label">Home</label>
    ${homePicker(state.adminMileageHome, 'mileage')}
  </div>`;

  const home = HOMES[state.adminMileageHome];
  const defaultFrom = state.mileageDateFrom || (()=>{ const d=new Date(); d.setDate(d.getDate()-13); return formatYMD(d); })();
  const defaultTo = state.mileageDateTo || todayStr();

  html += `<div class="card">
    <label class="field-label">Date range</label>
    <div class="admin-row">
      <div>
        <div class="hint" style="margin-bottom:4px;">From</div>
        <input type="date" id="mileageFromInput" value="${defaultFrom}">
      </div>
      <div>
        <div class="hint" style="margin-bottom:4px;">To</div>
        <input type="date" id="mileageToInput" value="${defaultTo}">
      </div>
    </div>
  </div>`;

  const allTrips = await getMileageTrips(state.adminMileageHome);
  const cars = await getStaffCars(state.adminMileageHome);
  const inRange = allTrips.filter(t => t.date >= defaultFrom && t.date <= defaultTo);

  const byStaff = {};
  inRange.forEach(t=>{
    if(!byStaff[t.staffName]) byStaff[t.staffName] = [];
    byStaff[t.staffName].push(t);
  });
  const staffNames = Object.keys(byStaff).sort();

  if(staffNames.length===0){
    html += `<div class="card"><div class="empty">No trips logged for ${home.name} in this date range.</div></div>`;
  } else {
    staffNames.forEach(name=>{
      const trips = byStaff[name];
      const unpaid = trips.filter(t=>!t.paid);
      const totalMiles = unpaid.reduce((sum,t)=>sum+t.miles, 0);
      const amount = (totalMiles * rate).toFixed(2);
      const mostRecentDate = trips.slice().sort((a,b)=> b.date.localeCompare(a.date))[0].date;
      const rowId = 'mi_'+name.replace(/\s+/g,'_');
      const isOpen = state.expandedReview === rowId;
      html += `<div class="card">
        <button class="review-summary-btn" data-reviewrow="${rowId}">
          <span class="who">${esc(name)}${cars[name] ? ' · '+esc(cars[name]) : ''}</span>
          <span class="review-chevron">${isOpen ? '▾' : '▸'}</span>
        </button>
        <div class="hint">Last submitted: <strong>${mostRecentDate}</strong> · ${unpaid.length} unpaid trip(s) · ${totalMiles} mi · <strong>$${amount} owed</strong>${trips.length>unpaid.length ? ` · ${trips.length-unpaid.length} already paid` : ''}</div>
        ${isOpen ? `
          <ul style="margin:10px 0 0; padding-left:18px; font-size:13.5px;">
            ${trips.map(t=>`<li style="${t.paid?'color:var(--ink-soft); text-decoration:line-through;':''}">Submitted <strong>${t.date}</strong> · ${t.miles} mi${t.purpose ? ' — '+esc(t.purpose) : ''}${t.scope && t.scope!=='__general__' ? ' ('+esc(t.scope)+')' : ''}${t.paid ? ' · paid' : ''}</li>`).join('')}
          </ul>
          ${unpaid.length ? `<button class="small" data-markpaid="${esc(name)}" style="margin-top:10px;">Mark ${unpaid.length} trip(s) as paid</button>` : ''}
        ` : ''}
      </div>`;
    });
  }
  return html;
}

async function extractClientProfileFromText(){
  try{
    const input = document.getElementById('profileAIInput');
    if(!input) throw new Error("Couldn't find the text box — try reopening this page.");
    const text = input.value.trim();
    if(!text){ state.profileAIError = 'Paste in some notes or a document first.'; render(); return; }
    state.profileAILoading = true;
    state.profileAIError = '';
    render();

    if(!getApiKey()) throw new Error('Add your Anthropic API key at the top of Manage Objectives first.');
    const fetchPromise = fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: anthropicHeaders(),
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{
          role:'user',
          content: `You are turning a residential care client's profile document into a condensed staff "cheat sheet" — short, scannable, high-signal only. Here is the source material:

${text}

Return ONLY raw JSON, no markdown fences, no prose, shaped exactly as:
{"dos":["short actionable bullet", "..."],"avoids":["short actionable bullet", "..."],"redirection":["short actionable bullet for what to try if the person becomes upset or triggered", "..."],"communicationStyle":"1-3 sentence summary of how staff should talk with and engage this person","interests":"1-2 sentence summary of preferred activities/interests","foodLikes":"short comma-separated list or short phrase","foodDislikes":"short comma-separated list or short phrase","otherNotes":"1-3 sentences for anything important that doesn't fit the above categories"}

Rules:
- dos and avoids should be the single most important, actionable items only — aim for 3-6 bullets each, not an exhaustive transcription.
- Keep every bullet short — under 15 words each where possible.
- If a category has no relevant information in the source, return an empty array or empty string for it — do not invent information.
- Do not include sensitive family/relationship details unless they are directly relevant to how staff should behave (e.g. "avoid asking about X" is fine, editorializing is not).`
        }]
      })
    });
    const timeoutPromise = new Promise((_, rej)=>setTimeout(()=>rej(new Error('TIMEOUT')), 30000));
    const response = await Promise.race([fetchPromise, timeoutPromise]);
    if(!response.ok) throw new Error(`AI request failed (status ${response.status}). Try again in a moment.`);
    const data = await response.json();
    const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const cleaned = textBlocks.replace(/```json|```/g,'').trim();
    let parsed;
    try{ parsed = JSON.parse(cleaned); }catch(e){ throw new Error("Couldn't quite parse that — try again."); }

    state.profileDraft = {
      ...state.profileDraft,
      dos: Array.isArray(parsed.dos) ? parsed.dos : state.profileDraft.dos,
      avoids: Array.isArray(parsed.avoids) ? parsed.avoids : state.profileDraft.avoids,
      redirection: Array.isArray(parsed.redirection) ? parsed.redirection : state.profileDraft.redirection,
      communicationStyle: parsed.communicationStyle || state.profileDraft.communicationStyle,
      interests: parsed.interests || state.profileDraft.interests,
      foodLikes: parsed.foodLikes || state.profileDraft.foodLikes,
      foodDislikes: parsed.foodDislikes || state.profileDraft.foodDislikes,
      otherNotes: parsed.otherNotes || state.profileDraft.otherNotes
    };
    state.profileAILoading = false;
    state.profileAIText = '';
    render();
  }catch(e){
    state.profileAILoading = false;
    state.profileAIError = (e && e.message) || 'Something went wrong — try again.';
    render();
  }
}

async function renderReview(){
  let html = `<div class="card">
    <label class="field-label">Home</label>
    ${homePicker(state.reviewHome, 'review')}
    <label class="field-label" style="margin-top:12px;">Date</label>
    <input type="date" id="reviewDate" value="${state.reviewDate}">
  </div>`;

  const checkins = await getCheckins(state.reviewHome, state.reviewDate);
  const checkinNames = Object.keys(checkins);
  html += `<div class="card">
    <h3 style="margin-bottom:6px;">Checked in — ${state.reviewDate}</h3>
    ${checkinNames.length===0 ? `<div class="empty">No one has checked in yet for this date.</div>` : `
      <ul style="margin:0; padding-left:0; list-style:none; font-size:14px;">
        ${checkinNames.map(name=>{
          const c = checkins[name];
          return `<li style="display:flex; align-items:center; gap:8px; padding:6px 0;">
            <span style="color:#2ECC71; font-size:16px;">●</span>
            <strong>${esc(c.displayName || name)}</strong> — ${c.shift} shift
            <span class="hint" style="margin:0;">· ${new Date(c.timestamp).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}</span>
          </li>`;
        }).join('')}
      </ul>
    `}
  </div>`;

  const subs = await getSubmissions(state.reviewHome, state.reviewDate);

  const totalDone = subs.reduce((sum,s)=>sum+s.doneItems, 0);
  const totalItemsAll = subs.reduce((sum,s)=>sum+s.totalItems, 0);
  const completionPct = totalItemsAll > 0 ? Math.round(100*totalDone/totalItemsAll) : null;
  const notCompletedAll = [];
  subs.forEach(s=>{
    (s.items||[]).forEach(i=>{
      if(i.status==='not_completed') notCompletedAll.push({ title:i.title, staffName:s.staffName, shift:s.shift, note:i.note });
    });
  });
  html += `<div class="card">
    <h3 style="margin-bottom:6px;">📋 Day Summary — ${state.reviewDate}</h3>
    ${subs.length===0 ? `<div class="empty">No submissions yet for this date.</div>` : `
      <div class="hint">${checkinNames.length} checked in · ${subs.length} shift${subs.length===1?'':'s'} submitted · ${completionPct!==null ? completionPct+'% overall completion' : ''}</div>
      ${notCompletedAll.length ? `
        <div class="hint" style="margin-top:10px; font-weight:700; color:#B4483A;">⚠ Not completed (${notCompletedAll.length}):</div>
        <ul style="margin:4px 0 0; padding-left:18px; font-size:13.5px;">
          ${notCompletedAll.map(n=>`<li><strong>${esc(n.title)}</strong> — ${esc(n.staffName)}, ${n.shift} shift${n.note ? ' — "'+esc(n.note)+'"' : ''}</li>`).join('')}
        </ul>
      ` : `<div class="hint" style="margin-top:8px; color:#1F6F3A;">✓ Everything submitted so far was marked completed.</div>`}
    `}
  </div>`;

  html += `<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0;">📊 Staff Snapshot (last 7 days)</h3>
      <button class="ghost" id="toggleStaffSnapshotBtn" style="padding:6px 14px; font-size:12.5px;">${state.staffSnapshotOpen ? 'Hide' : (state.staffSnapshotLoading ? 'Loading…' : 'Show')}</button>
    </div>
    ${state.staffSnapshotOpen ? (
      state.staffSnapshotLoading ? `<div class="hint" style="margin-top:8px;">Loading…</div>` :
      (!state.staffSnapshotData || state.staffSnapshotData.length===0) ? `<div class="empty">No activity in the last 7 days.</div>` : `
        <ul style="margin:10px 0 0; padding-left:0; list-style:none; font-size:14px;">
          ${state.staffSnapshotData.map(s=>{
            const pct = s.totalItems > 0 ? Math.round(100*s.doneItems/s.totalItems) : null;
            return `<li style="padding:8px 0; border-top:1px solid var(--line);">
              <strong>${esc(s.displayName)}</strong>
              <div class="hint">${s.checkins} check-in${s.checkins===1?'':'s'} · ${pct!==null ? pct+'% completion' : 'no submissions'} · ${s.miles} mi logged</div>
            </li>`;
          }).join('')}
        </ul>
      `
    ) : ''}
  </div>`;

  html += `<div class="card">
    <h3 style="margin-bottom:6px;">${HOMES[state.reviewHome].name} — ${state.reviewDate}</h3>`;
  if(subs.length===0){
    html += `<div class="empty">No shift check-ins submitted for this date yet.</div>`;
  } else {
    subs.forEach((s,i)=>{
      const rowId = s.timestamp+'_'+i;
      const isOpen = state.expandedReview === rowId;
      html += `<div class="review-entry">
        <button class="review-summary-btn" data-reviewrow="${rowId}">
          <span class="who">${esc(s.staffName)} (${s.shift||'—'} shift) — ${s.doneItems}/${s.totalItems} completed</span>
          <span class="review-chevron">${isOpen ? '▾' : '▸'}</span>
        </button>
        <div class="when">${new Date(s.timestamp).toLocaleString()}</div>
        ${isOpen ? `
          <ul>${s.items.map(i=>{
            const label = i.status==='completed' ? '✓ Completed' : i.status==='not_completed' ? '✗ Not completed' : '— Not marked';
            const cls = i.status==='completed' ? '' : i.status==='not_completed' ? 'skipped' : 'unmarked';
            return `<li class="${cls}"><strong>${label}</strong> — ${esc(i.title)}${i.description ? ' ('+esc(i.description)+')' : ''}${i.note ? `<div class="hint" style="margin:2px 0 6px 0;">Reason: ${esc(i.note)}</div>` : ''}</li>`;
          }).join('')}</ul>
          ${s.notes ? `<div class="hint" style="margin-top:6px;"><strong>Note:</strong> ${esc(s.notes)}</div>` : ''}
          ${s.addenda && s.addenda.length ? `
            <div class="hint" style="margin-top:8px; font-weight:700;">Added afterward:</div>
            <ul>${s.addenda.map(a=>`<li><strong>${esc(a.staffName||'Unknown')}</strong> (${new Date(a.timestamp).toLocaleString()}): ${esc(a.text)}</li>`).join('')}</ul>
          ` : ''}
          <button class="delete-review-btn" data-deletesub="${rowId}">Delete this entry</button>
        ` : ''}
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

function resizeImageFile(file, maxSize){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height){
          if(width > maxSize){ height = Math.round(height * maxSize / width); width = maxSize; }
        } else {
          if(height > maxSize){ width = Math.round(width * maxSize / height); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function wireReview(){
  document.querySelectorAll('.home-pick').forEach(b=>{
    b.onclick = ()=>{ state.reviewHome = b.dataset.home; state.expandedReview = null; state.staffSnapshotOpen = false; state.staffSnapshotData = null; render(); };
  });
  const dateInput = document.getElementById('reviewDate');
  if(dateInput) dateInput.onchange = (e)=>{ state.reviewDate = e.target.value; state.expandedReview = null; render(); };
  const toggleSnapshotBtn = document.getElementById('toggleStaffSnapshotBtn');
  if(toggleSnapshotBtn) toggleSnapshotBtn.onclick = async ()=>{
    if(state.staffSnapshotOpen){
      state.staffSnapshotOpen = false;
      render();
      return;
    }
    state.staffSnapshotOpen = true;
    state.staffSnapshotLoading = true;
    render();
    try{
      state.staffSnapshotData = await computeStaffSnapshot(state.reviewHome);
    }catch(e){
      state.staffSnapshotData = [];
    }
    state.staffSnapshotLoading = false;
    render();
  };
  document.querySelectorAll('[data-reviewrow]').forEach(b=>{
    b.onclick = ()=>{
      const id = b.dataset.reviewrow;
      state.expandedReview = (state.expandedReview === id) ? null : id;
      render();
    };
  });
  document.querySelectorAll('[data-deletesub]').forEach(b=>{
    b.onclick = async ()=>{
      try{
        const subs = await getSubmissions(state.reviewHome, state.reviewDate);
        const remaining = subs.filter((s,i)=> (s.timestamp+'_'+i) !== b.dataset.deletesub);

        state.expandedReview = null;
        state.actionError = '';
      }catch(e){
        state.actionError = "Couldn't delete that entry — check your connection and try again.";
      }
      render();
    };
  });
}

function updateLiveClock(){
  const el = document.getElementById('liveClock');
  if(!el) return;
  const now = new Date();
  const dateStr = now.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  const timeStr = now.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
  el.textContent = `${dateStr} · ${timeStr}`;
}
updateLiveClock();
// Sync to the top of the next minute, then tick once a minute — never re-renders
// the app, so it can never interrupt someone mid-typing in a note or name field.
setTimeout(function alignAndTick(){
  updateLiveClock();
  setInterval(updateLiveClock, 60000);
}, 60000 - (Date.now() % 60000));

function updateScrollIndicator(){
  const el = document.getElementById('scrollIndicator');
  if(!el) return;
  const scrollable = document.body.scrollHeight > window.innerHeight + 40;
  if(!scrollable){
    el.style.display = 'none';
    return;
  }
  const atBottom = (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 30);
  el.style.display = 'block';
  if(atBottom){
    el.textContent = "✓ You're at the end";
    el.classList.add('at-bottom');
  } else {
    el.textContent = 'Keep scrolling ↓';
    el.classList.remove('at-bottom');
  }
}
// Attached once, permanently — reacts live as the person scrolls, and never
// touches render() so it can't interrupt typing anywhere else on the page.
window.addEventListener('scroll', updateScrollIndicator, { passive:true });
window.addEventListener('resize', updateScrollIndicator);

render();
</script>
